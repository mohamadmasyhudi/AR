<!DOCTYPE html>
<html>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs>
      <a-marker preset="hiro">

        <a-text value="Project Arsitektur" position="-1 1.2 0" color="black"></a-text>

      <a-entity camera></a-entity>
    </a-scene>
