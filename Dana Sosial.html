<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Alokasi Dana Sosial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 95%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #hasil-output {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }
        .result-item:last-child {
            border-bottom: none;
            font-weight: bold;
            color: #007bff;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kalkulator Alokasi Dana Sosial</h2>

        <div>
            <label for="pendapatan">Pendapatan Bulanan (Rp)</label>
            <input type="number" id="pendapatan" placeholder="Masukkan jumlah pendapatan (misal: 12000000)">
            <button onclick="hitungAlokasi()">Hitung Alokasi</button>
        </div>

        <div id="hasil-output" style="display:none;">
            <h3>Detail Alokasi</h3>
            <div class="result-item">
                <span>Total Dana Sosial (10%)</span>
                <span id="dana-sosial"></span>
            </div>
            <div class="result-item">
                <span>Iuran Wajib Bulanan (IWB - 40%)</span>
                <span id="iwb"></span>
            </div>
            <div class="result-item">
                <span>Zakat Profesi (25%)</span>
                <span id="zakat"></span>
            </div>
            <div class="result-item">
                <span>Infak/Sedekah (35%)</span>
                <span id="infak"></span>
            </div>
            <div class="result-item">
                <span>Total Alokasi Dana Sosial</span>
                <span id="total-alokasi"></span>
            </div>
        </div>

    </div>

    <script>
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }

        function hitungAlokasi() {
            const pendapatanInput = document.getElementById('pendapatan');
            const pendapatan = parseFloat(pendapatanInput.value);

            if (isNaN(pendapatan) || pendapatan <= 0) {
                alert("Mohon masukkan jumlah pendapatan yang valid.");
                document.getElementById('hasil-output').style.display = 'none';
                return;
            }

            // Persentase
            const PERSEN_DANA_SOSIAL = 0.10; // 10%
            const PERSEN_IWB = 0.40;   // 40% dari Dana Sosial
            const PERSEN_ZAKAT = 0.25; // 25% dari Dana Sosial
            const PERSEN_INFAK = 0.35; // 35% dari Dana Sosial

            // Perhitungan
            const danaSosial = pendapatan * PERSEN_DANA_SOSIAL;
            const iwb = danaSosial * PERSEN_IWB;
            const zakatProfesi = danaSosial * PERSEN_ZAKAT;
            const infak = danaSosial * PERSEN_INFAK;
            const totalAlokasi = iwb + zakatProfesi + infak; // Harus sama dengan danaSosial

            // Tampilkan Hasil
            document.getElementById('dana-sosial').textContent = formatRupiah(danaSosial);
            document.getElementById('iwb').textContent = formatRupiah(iwb);
            document.getElementById('zakat').textContent = formatRupiah(zakatProfesi);
            document.getElementById('infak').textContent = formatRupiah(infak);
            document.getElementById('total-alokasi').textContent = formatRupiah(totalAlokasi);
            
            document.getElementById('hasil-output').style.display = 'block';
        }

    </script>

</body>
</html>
